name: Collect Playcount Mid

on:
  schedule:
    - cron: '30 9 * * *'   # JST 18:30
    - cron: '30 21 * * *'  # JST 6:30
  workflow_dispatch:

jobs:
  collect-mid:
    runs-on: ubuntu-latest
    steps:
      - name: Run collect-playcount mid with auto offset loop
        run: |
          #!/usr/bin/env bash
          set -euo pipefail

          LIMIT=1000
          offset=0
          MAX_RETRY=3

          echo "===== Collect Playcount Mid START ====="
          echo "Timestamp: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          while true; do
            echo "---- Running mid offset=$offset ----"

            BODY="{\"mode\":\"single\",\"type\":\"mid\",\"offset\":$offset,\"limit\":$LIMIT}"

            retry=0
            RESPONSE=""

            # ============================
            #   通信＋レスポンス検証ループ
            # ============================
            while true; do
              RESPONSE=$(curl -s --max-time 900 \
                -X POST https://ukdywjvpcsltnrktbbmg.functions.supabase.co/collect-playcount \
                -H "Content-Type: application/json" \
                -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
                -d "$BODY")

              echo "Response: $RESPONSE"

              # 空レスポンス
              if [ -z "$RESPONSE" ]; then
                retry=$((retry+1))
                if [ $retry -ge $MAX_RETRY ]; then
                  echo "Max retry reached. Stopping safely."
                  exit 0
                fi
                sleep 2
                continue
              fi

              # Cloudflare HTML
              if echo "$RESPONSE" | grep -qi "<html"; then
                echo "HTML response detected. Stopping safely."
                exit 0
              fi

              # JSON バリデーション
              if echo "$RESPONSE" | jq empty >/dev/null 2>&1; then
                break
              fi

              retry=$((retry+1))
              if [ $retry -ge $MAX_RETRY ]; then
                echo "Max retry reached. Stopping safely."
                exit 0
              fi
              sleep 2
            done

            # ============================
            #   次の offset を決める
            # ============================
            count=$(echo "$RESPONSE" | jq -r '.count // empty')

            if [ -z "$count" ]; then
              echo "No count returned. Stopping."
              break
            fi

            if [ "$count" -lt "$LIMIT" ]; then
              echo "Reached end of mid videos. Done."
              break
            fi

            offset=$((offset + LIMIT))
            sleep 1
          done

          echo "===== Collect Playcount Mid END ====="
