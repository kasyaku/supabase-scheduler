name: Collect New Videos

on:
  schedule:
    - cron: '5 * * * *'   # 毎時05分（UTC）
    - cron: '35 * * * *'  # 毎時35分（UTC）
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Call collect-new-videos with safety checks
        run: |
          #!/usr/bin/env bash
          set -euo pipefail

          MAX_RETRY=3
          retry=0
          RESPONSE=""

          while true; do
            echo "Calling collect-new-videos (retry=$retry)"

            RESPONSE=$(curl -s --retry 5 --retry-delay 2 --max-time 20 \
              -X POST "${{ secrets.SUPABASE_FUNCTION_URL_COLLECT_NEW_VIDEOS }}" \
              -H "Content-Type: application/json" \
              -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
              -d '{}')

            echo "Response: $RESPONSE"

            # --- 空レスポンス ---
            if [ -z "$RESPONSE" ]; then
              echo "Empty response. Retry $((retry+1))/$MAX_RETRY"
              retry=$((retry+1))
              if [ $retry -ge $MAX_RETRY ]; then
                echo "Max retry reached. Stopping safely."
                exit 0
              fi
              sleep 2
              continue
            fi

            # --- Cloudflare HTML（500/520/524） ---
            if echo "$RESPONSE" | grep -qi "<html"; then
              echo "HTML response detected. Stopping safely."
              exit 0
            fi

            # --- JSON バリデーション ---
            if echo "$RESPONSE" | jq empty >/dev/null 2>&1; then
              echo "Valid JSON. Success."
              break
            fi

            echo "Invalid JSON. Retry $((retry+1))/$MAX_RETRY"
            retry=$((retry+1))
            if [ $retry -ge $MAX_RETRY ]; then
              echo "Max retry reached. Stopping safely."
              exit 0
            fi
            sleep 2
          done

          echo "Collect new videos completed."

          # ============================================================
          # ⭐ Collect が成功したので Auto Tag Runner を実行
          # ============================================================
          echo "Running auto-tag-runner..."

          ATR_RESPONSE=$(curl -s --retry 5 --retry-delay 2 --max-time 900 \
            -X POST "${{ secrets.SUPABASE_FUNCTION_URL_AUTO_TAG_RUNNER }}" \
            -H "Content-Type: application/json" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -d '{}')

          echo "Auto Tag Runner Response: $ATR_RESPONSE"

          # --- 空レスポンス ---
          if [ -z "$ATR_RESPONSE" ]; then
            echo "Auto Tag Runner returned empty response. Stopping safely."
            exit 0
          fi

          # --- Cloudflare HTML ---
          if echo "$ATR_RESPONSE" | grep -qi "<html"; then
            echo "HTML response detected from Auto Tag Runner. Stopping safely."
            exit 0
          fi

          echo "Auto Tag Runner completed."
