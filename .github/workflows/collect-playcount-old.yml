name: Collect Playcount Old + Fix Missing Snapshot

on:
  schedule:
    - cron: '30 9 * * *'  # JST 18:30
  workflow_dispatch:

jobs:
  collect-old:
    runs-on: ubuntu-latest
    steps:
      - name: Run collect-playcount old with auto offset loop
        run: |
          #!/usr/bin/env bash
          set -euo pipefail

          LIMIT=1000
          offset=0
          MAX_RETRY=3

          echo "===== Collect Playcount Old START ====="
          echo "Timestamp: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          while true; do
            echo "---- Running old offset=$offset ----"

            BODY="{\"mode\":\"single\",\"type\":\"old\",\"offset\":$offset,\"limit\":$LIMIT}"

            retry=0
            RESPONSE=""

            # ============================
            #   йЂљдїЎпј‹гѓ¬г‚№гѓќгѓіг‚№ж¤њиЁјгѓ«гѓјгѓ—
            # ============================
            while true; do
              RESPONSE=$(curl -s --max-time 900 \
                -X POST https://ukdywjvpcsltnrktbbmg.functions.supabase.co/collect-playcount \
                -H "Content-Type: application/json" \
                -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
                -d "$BODY")

              echo "Response: $RESPONSE"

              # з©єгѓ¬г‚№гѓќгѓіг‚№
              if [ -z "$RESPONSE" ]; then
                retry=$((retry+1))
                if [ $retry -ge $MAX_RETRY ]; then
                  echo "Max retry reached. Stopping safely."
                  exit 0
                fi
                sleep 2
                continue
              fi

              # Cloudflare HTML
              if echo "$RESPONSE" | grep -qi "<html"; then
                echo "HTML response detected. Stopping safely."
                exit 0
              fi

              # JSON гѓђгѓЄгѓ‡гѓјг‚·гѓ§гѓі
              if echo "$RESPONSE" | jq empty >/dev/null 2>&1; then
                break
              fi

              retry=$((retry+1))
              if [ $retry -ge $MAX_RETRY ]; then
                echo "Max retry reached. Stopping safely."
                exit 0
              fi
              sleep 2
            done

            # ============================
            #   ж¬ЎгЃ® offset г‚’ж±єг‚Ѓг‚‹
            # ============================
            count=$(echo "$RESPONSE" | jq -r '.count // empty')

            if [ -z "$count" ]; then
              echo "No count returned. Stopping."
              break
            fi

            if [ "$count" -lt "$LIMIT" ]; then
              echo "Reached end of old videos. Done."
              break
            fi

            offset=$((offset + LIMIT))
            sleep 1
          done

          echo "===== Collect Playcount Old END ====="

      # ============================================
      #  рџ”Ґ гЃ“гЃ“гЃ‹г‚‰ fix-missing-snapshot г‚’и‡Єе‹•е®џиЎЊ
      # ============================================
      - name: Run fix-missing-snapshot
        run: |
          echo "===== Running fix-missing-snapshot ====="

          RESPONSE=$(curl -s --max-time 900 \
            -X POST https://ukdywjvpcsltnrktbbmg.functions.supabase.co/fix-missing-snapshot \
            -H "Content-Type: application/json" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -d "{}")

          echo "Response: $RESPONSE"

          # Cloudflare HTML
          if echo "$RESPONSE" | grep -qi "<html"; then
            echo "HTML response detected. Stopping safely."
            exit 0
          fi

          # JSON гѓђгѓЄгѓ‡гѓјг‚·гѓ§гѓі
          if ! echo "$RESPONSE" | jq empty >/dev/null 2>&1; then
            echo "Invalid JSON from fix-missing-snapshot"
            exit 1
          fi

          echo "===== fix-missing-snapshot DONE ====="
