name: Update Published Videos

on:
  schedule:
    - cron: '0 10 * * *'   # JST 19:00
    - cron: '30 10 * * *'  # JST 19:30
    - cron: '0 11 * * *'   # JST 20:00
    - cron: '30 11 * * *'  # JST 20:30
    - cron: '0 12 * * *'   # JST 21:00
    - cron: '30 12 * * *'  # JST 21:30
    - cron: '0 13 * * *'   # JST 22:00
    - cron: '30 13 * * *'  # JST 22:30
    - cron: '0 14 * * *'   # JST 23:00
    - cron: '30 14 * * *'  # JST 23:30
  workflow_dispatch:

jobs:
  call-function:
    runs-on: ubuntu-latest
    steps:
      - name: Call Supabase Function
        run: |
          MAX_RETRY=3
          RETRY=0

          while [ $RETRY -lt $MAX_RETRY ]; do
            echo "Calling update-published-videos (retry=$RETRY)"

            RESPONSE=$(curl -s -X POST \
              https://ukdywjvpcsltnrktbbmg.functions.supabase.co/update-published-videos \
              -H "Content-Type: application/json" \
              -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            )

            echo "Response: $RESPONSE"

            # JSON 判定
            if echo "$RESPONSE" | jq empty >/dev/null 2>&1; then
              echo "Valid JSON. Success."
              break
            fi

            RETRY=$((RETRY+1))
            echo "Invalid JSON. Retry $RETRY/$MAX_RETRY"
            sleep 3
          done

          if [ $RETRY -eq $MAX_RETRY ]; then
            echo "Max retry reached. Stopping safely."
          fi

          echo "Update published videos completed."
