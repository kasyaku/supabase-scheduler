name: Run Ranking Snapshot

on:
  schedule:
    - cron: "40 9 * * *" # JST 18:40（UTC 09:40）
  workflow_dispatch:

jobs:
  run-snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Call Supabase Edge Function (ranking-snapshot)
        id: call_api
        run: |
          echo "Calling ranking-snapshot..."

          for i in {1..3}; do
            RESPONSE=$(curl -s -w "\n%{http_code}" \
              -X POST \
              -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
              -H "Content-Type: application/json" \
              https://ukdywjvpcsltnrktbbmg.supabase.co/functions/v1/ranking-snapshot)

            BODY=$(echo "$RESPONSE" | head -n1)
            STATUS=$(echo "$RESPONSE" | tail -n1)

            echo "Status: $STATUS"
            echo "Body: $BODY"

            if [ "$STATUS" -eq 200 ]; then
              echo "Success"
              exit 0
            fi

            echo "Retrying in 5 seconds..."
            sleep 5
          done

          echo "Failed after 3 attempts"
          exit 1
